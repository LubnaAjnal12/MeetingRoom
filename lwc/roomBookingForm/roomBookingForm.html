<template>
    <div class="form-container">
        <lightning-card title={formTitle} icon-name="standard:event">
            <div class="slds-var-p-around_medium">
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </template>
                
                <div class="slds-grid slds-wrap slds-gutters">
                    <!-- Room Selection -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-combobox
                            data-field="room"
                            label="Select Meeting Room"
                            value={roomId}
                            options={roomOptions}
                            onchange={handleRoomChange}
                            placeholder="Choose a room"
                            required
                            disabled={isLoading}
                        ></lightning-combobox>
                    </div>
                    
                    <!-- Booking Date -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input
                            data-field="date"
                            type="date"
                            label="Booking Date"
                            value={bookingDate}
                            onchange={handleDateChange}
                            min={minDate}
                            required
                            placeholder="Select date"
                            disabled={isLoading}
                        ></lightning-input>
                    </div>
                    
                    <!-- Start Time -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-combobox
                            data-field="startTime"
                            label="Start Time"
                            value={startTime}
                            options={filteredStartTimeOptions}
                            onchange={handleStartTimeChange}
                            placeholder="Select start time"
                            required
                            disabled={isLoading}
                        ></lightning-combobox>
                    </div>
                    
                    <!-- End Time -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-combobox
                            data-field="endTime"
                            label="End Time"
                            value={endTime}
                            options={filteredEndTimeOptions}
                            onchange={handleEndTimeChange}
                            placeholder="Select end time"
                            required
                            disabled={isLoading}
                        ></lightning-combobox>
                    </div>
                    
                    <!-- Status -->
                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-combobox
                            label="Status"
                            value={status}
                            options={statusOptions}
                            onchange={handleStatusChange}
                            disabled={isLoading}
                        ></lightning-combobox>
                    </div>
                </div>
                
                <!-- Action Buttons -->
                <div class="slds-var-m-top_large button-group">
                    <lightning-button
                        variant="brand"
                        label={saveButtonLabel}
                        onclick={handleSave}
                        disabled={isLoading}
                        class="slds-var-m-right_small">
                    </lightning-button>
                    
                    <template if:true={showCancelButton}>
                        <lightning-button
                            variant="neutral"
                            label="Cancel"
                            onclick={handleCancel}
                            disabled={isLoading}>
                        </lightning-button>
                    </template>
                </div>
            </div>
        </lightning-card>
    </div>
</template>
