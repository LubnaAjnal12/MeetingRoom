<template>
    <div class="list-container">
        <lightning-card title="Room Bookings" icon-name="standard:event">
            <div slot="actions">
                <lightning-button-icon icon-name="utility:refresh" alternative-text="Refresh" onclick={handleRefresh}
                    title="Refresh List"></lightning-button-icon>
            </div>

            <div class="slds-var-p-around_medium">
                <!-- Filters Row -->
                <div class="filters-row slds-var-m-bottom_medium">
                    <div class="search-container">
                        <lightning-input type="search" label="Search Bookings" value={searchTerm}
                            onchange={handleSearch} placeholder="Search by booking or room name..."
                            variant="label-hidden"></lightning-input>
                    </div>

                    <div class="filter-container">
                        <lightning-combobox label="Filter by Status" value={filterStatus} options={statusFilterOptions}
                            onchange={handleStatusFilter} variant="label-hidden"></lightning-combobox>
                    </div>
                </div>

                <!-- Loading Spinner -->
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </template>

                <!-- Booking Count -->
                <div class="slds-var-m-bottom_small">
                    <p class="booking-count">Total Bookings: {bookingCount}</p>
                </div>

                <!-- Bookings Grid -->
                <template if:true={hasBookings}>
                    <div class="slds-grid slds-wrap slds-gutters">
                        <template for:each={enrichedBookings} for:item="booking">
                            <div key={booking.Id}
                                class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3">
                                <div class="booking-card">
                                    <div class="booking-card-header">
                                        <h3 class="booking-name">
                                            <lightning-icon icon-name="standard:event" size="small"
                                                class="slds-var-m-right_x-small"></lightning-icon>
                                            {booking.Name}
                                        </h3>
                                        <span class={booking.statusClass}>{booking.statusDisplayed}</span>
                                    </div>

                                    <div class="booking-card-body">
                                        <div class="booking-detail">
                                            <lightning-icon icon-name="standard:location"
                                                size="x-small"></lightning-icon>
                                            <span class="detail-label">Room:</span>
                                            <span class="detail-value">{booking.Room__r.Name}</span>
                                        </div>

                                        <div class="booking-detail">
                                            <lightning-icon icon-name="utility:date_input"
                                                size="x-small"></lightning-icon>
                                            <span class="detail-label">Date:</span>
                                            <span class="detail-value">{booking.formattedDate}</span>
                                        </div>

                                        <div class="booking-detail">
                                            <lightning-icon icon-name="utility:clock" size="x-small"></lightning-icon>
                                            <span class="detail-label">Time:</span>
                                            <span class="detail-value">{booking.startTime} - {booking.endTime}</span>
                                        </div>

                                        <div class="booking-detail">
                                            <lightning-icon icon-name="utility:user" size="x-small"></lightning-icon>
                                            <span class="detail-label">Booked By:</span>
                                            <span class="detail-value">{booking.bookedByName}</span>
                                        </div>

                                        <!-- <template if:true={booking.Meeting_Link__c}>
                                            <div class="booking-detail">
                                                <lightning-icon icon-name="utility:link" size="x-small"></lightning-icon>
                                                <span class="detail-label">Meeting:</span>
                                                <a href={booking.Meeting_Link__c} target="_blank" class="detail-value meeting-link">Join Teams Meeting</a>
                                            </div>
                                        </template> -->
                                        <template if:true={booking.showJoinMeeting}>
                                            <div class="booking-detail">
                                                <lightning-icon icon-name="utility:link"
                                                    size="x-small"></lightning-icon>
                                                <span class="detail-label">Meeting:</span>
                                                <a href={booking.Meeting_Link__c} target="_blank"
                                                    class="detail-value meeting-link">
                                                    Join Meeting
                                                </a>
                                            </div>
                                        </template>

                                        <template if:true={booking.showCopyLink}>
                                            <div class="booking-detail">
                                                <lightning-icon icon-name="utility:link"
                                                    size="x-small"></lightning-icon>
                                                <span class="detail-label">Meeting Link:</span>
                                                <a href="javascript:void(0);" data-link={booking.Meeting_Link__c}
                                                    class="detail-value meeting-link" onclick={handleCopyLink}>
                                                    Copy Meeting Link
                                                </a>
                                            </div>
                                        </template>
                                    </div>

                                    <div class="booking-card-footer">
                                        <!-- Join Meeting Button - Only for Confirmed with meeting link -->
                                        <!-- <template if:true={booking.showJoinMeeting}>
                                            <lightning-button variant="success" label="Join Meeting"
                                                onclick={handleJoinMeeting} data-link={booking.Meeting_Link__c}
                                                class="slds-var-m-right_x-small join-meeting-btn"></lightning-button>
                                        </template> -->

                                        <!-- Copy Link Button - For Confirmed and Completed with meeting link -->
                                        <!-- <template if:true={booking.showCopyLink}>
                                            <lightning-button variant="neutral" label="Copy Link"
                                                icon-name="utility:copy" onclick={handleCopyLink}
                                                data-link={booking.Meeting_Link__c}
                                                class="slds-var-m-right_x-small"></lightning-button>
                                        </template> -->

                                        <!-- Edit Button - Only for Confirmed -->
                                        <template if:true={booking.showEdit}>
                                            <lightning-button variant="brand" label="Edit" onclick={handleEdit}
                                                data-id={booking.Id}
                                                class="slds-var-m-right_x-small"></lightning-button>
                                        </template>

                                        <!-- Cancel Booking Button - Only for Confirmed -->
                                        <template if:true={booking.showCancel}>
                                            <lightning-button variant="neutral" label="Cancel Booking"
                                                onclick={handleCancelBooking} data-id={booking.Id}
                                                class="slds-var-m-right_x-small"></lightning-button>
                                        </template>

                                        <!-- Delete Button - Always visible -->
                                        <template if:true={booking.showDelete}>
                                            <lightning-button variant="destructive" label="Delete"
                                                onclick={handleDelete} data-id={booking.Id}></lightning-button>
                                        </template>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Empty State -->
                <template if:false={hasBookings}>
                    <div class="empty-state">
                        <lightning-icon icon-name="custom:custom85" size="large"></lightning-icon>
                        <h3 class="slds-var-m-top_medium">No Bookings Found</h3>
                        <p class="slds-var-m-top_small">
                            <template if:true={searchTerm}>
                                No bookings match your search criteria.
                            </template>
                            <template if:false={searchTerm}>
                                Create your first booking using the form above.
                            </template>
                        </p>
                    </div>
                </template>
            </div>
        </lightning-card>
    </div>
</template>
