<template>
    <lightning-card title="Meeting Room Booking System" icon-name="standard:event">
        
        <!-- Main Container with 2-Column Layout -->
        <div class="slds-grid slds-wrap slds-gutters">
            
            <!-- LEFT COLUMN: New Booking Form -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_5-of-12">
                <article class="slds-card slds-card_boundary">
                    <div class="slds-card__header slds-grid">
                        <header class="slds-media slds-media_center slds-has-flexi-truncate">
                            <div class="slds-media__figure">
                                <span class="slds-icon_container slds-icon-standard-task2">
                                    <lightning-icon icon-name="standard:task2" size="small"></lightning-icon>
                                </span>
                            </div>
                            <div class="slds-media__body">
                                <h2 class="slds-card__header-title">
                                    <span>New Booking</span>
                                </h2>
                            </div>
                        </header>
                    </div>
                    <div class="slds-card__body slds-card__body_inner">
                        
                        <!-- Room Selection -->
                        <lightning-combobox
                            name="room"
                            label="Select Room"
                            value={selectedRoomId}
                            placeholder="Choose a meeting room"
                            options={rooms}
                            onchange={handleRoomChange}
                            required
                            class="slds-m-bottom_small">
                        </lightning-combobox>

                        <!-- Booking Date -->
                        <lightning-input
                            type="date"
                            name="bookingDate"
                            label="Booking Date"
                            value={bookingDate}
                            onchange={handleDateChange}
                            required
                            class="slds-m-bottom_small">
                        </lightning-input>

                        <!-- Time Fields in Grid -->
                        <div class="slds-grid slds-gutters slds-m-bottom_small">
                            <div class="slds-col">
                                <lightning-input
                                    type="time"
                                    name="startTime"
                                    label="Start Time"
                                    value={startTime}
                                    onchange={handleStartTimeChange}
                                    required>
                                </lightning-input>
                            </div>
                            <div class="slds-col">
                                <lightning-input
                                    type="time"
                                    name="endTime"
                                    label="End Time"
                                    value={endTime}
                                    onchange={handleEndTimeChange}
                                    required>
                                </lightning-input>
                            </div>
                        </div>

                        <!-- Create Button -->
                        <lightning-button
                            variant="brand"
                            label="Create Booking"
                            title="Create new booking"
                            icon-name="utility:add"
                            onclick={handleCreateBooking}
                            disabled={isLoading}
                            class="slds-m-top_medium slds-float_right">
                        </lightning-button>

                        <!-- Loading Spinner -->
                        <template if:true={isLoading}>
                            <div class="slds-m-top_medium">
                                <lightning-spinner alternative-text="Creating booking..." size="small"></lightning-spinner>
                            </div>
                        </template>
                    </div>
                </article>
            </div>

            <!-- RIGHT COLUMN: Booking List -->
            <div class="slds-col slds-size_1-of-1 slds-large-size_7-of-12">
                <article class="slds-card slds-card_boundary">
                    <div class="slds-card__header slds-grid">
                        <header class="slds-media slds-media_center slds-has-flexi-truncate">
                            <div class="slds-media__figure">
                                <span class="slds-icon_container slds-icon-standard-calibration">
                                    <lightning-icon icon-name="standard:calibration" size="small"></lightning-icon>
                                </span>
                            </div>
                            <div class="slds-media__body">
                                <h2 class="slds-card__header-title">
                                    <span>Booking List</span>
                                </h2>
                            </div>
                        </header>
                        <div class="slds-no-flex">
                            <lightning-combobox
                                name="statusFilter"
                                label="Filter by Status"
                                value={statusFilter}
                                options={statusOptions}
                                onchange={handleStatusChange}
                                variant="label-hidden">
                            </lightning-combobox>
                        </div>
                    </div>
                    <div class="slds-card__body slds-card__body_inner">
                        
                        <!-- Empty State -->
                        <template if:false={hasBookings}>
                            <div class="slds-illustration slds-illustration_small">
                                <div class="slds-text-align_center slds-p-around_medium">
                                    <lightning-icon icon-name="custom:custom85" size="large" class="slds-m-bottom_small"></lightning-icon>
                                    <h3 class="slds-text-heading_medium slds-m-bottom_x-small">No bookings found</h3>
                                    <p class="slds-text-body_regular">Create your first booking using the form on the left.</p>
                                </div>
                            </div>
                        </template>

                        <!-- Booking Cards -->
                        <template if:true={hasBookings}>
                            <div class="booking-list">
                                <template for:each={bookings} for:item="booking">
                                    <article key={booking.Id} class="slds-card slds-card_boundary booking-card">
                                        <div class="slds-card__body">
                                            <div class="slds-grid slds-wrap slds-gutters_x-small">
                                                
                                                <!-- Booking Info -->
                                                <div class="slds-col slds-size_1-of-1 slds-medium-size_8-of-12">
                                                    <div class="slds-grid slds-grid_vertical-align-start">
                                                        <div class="slds-col slds-no-flex">
                                                            <lightning-icon icon-name="standard:event" size="small" class="slds-m-right_small"></lightning-icon>
                                                        </div>
                                                        <div class="slds-col">
                                                            <div class="slds-text-heading_small slds-m-bottom_xx-small">{booking.RoomName}</div>
                                                            <div class="slds-text-body_small slds-text-color_weak">
                                                                <p><strong>Booking:</strong> {booking.Name}</p>
                                                                <p><strong>Date:</strong> {booking.FormattedDate}</p>
                                                                <p><strong>Time:</strong> {booking.FormattedStartTime} - {booking.FormattedEndTime}</p>
                                                                <p><strong>Booked By:</strong> {booking.BookedByName}</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <!-- Status & Actions -->
                                                <div class="slds-col slds-size_1-of-1 slds-medium-size_4-of-12 slds-text-align_right">
                                                    <lightning-badge label={booking.Status__c} class={booking.StatusClass}></lightning-badge>
                                                    <div class="slds-m-top_small">
                                                        <lightning-button-icon
                                                            icon-name="utility:edit"
                                                            alternative-text="Edit"
                                                            title="Edit Booking"
                                                            onclick={handleEditBooking}
                                                            data-id={booking.Id}
                                                            class="slds-m-right_xx-small">
                                                        </lightning-button-icon>
                                                        <lightning-button-icon
                                                            icon-name="utility:delete"
                                                            alternative-text="Delete"
                                                            title="Delete Booking"
                                                            onclick={handleDeleteBooking}
                                                            data-id={booking.Id}
                                                            variant="error">
                                                        </lightning-button-icon>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </article>
                                </template>
                            </div>
                        </template>
                    </div>
                </article>
            </div>
        </div>

        <!-- Edit Booking Modal -->
        <template if:true={showEditModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeEditModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">Edit Booking</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        
                        <!-- Edit Form -->
                        <lightning-combobox
                            name="editRoom"
                            label="Select Room"
                            value={editBooking.Room__c}
                            options={rooms}
                            onchange={handleEditRoomChange}
                            required
                            class="slds-m-bottom_small">
                        </lightning-combobox>

                        <lightning-input
                            type="date"
                            name="editDate"
                            label="Booking Date"
                            value={editBooking.Date__c}
                            onchange={handleEditDateChange}
                            required
                            class="slds-m-bottom_small">
                        </lightning-input>

                        <div class="slds-grid slds-gutters slds-m-bottom_small">
                            <div class="slds-col">
                                <lightning-input
                                    type="time"
                                    name="editStartTime"
                                    label="Start Time"
                                    value={editBooking.Start_Time__c}
                                    onchange={handleEditStartTimeChange}
                                    required>
                                </lightning-input>
                            </div>
                            <div class="slds-col">
                                <lightning-input
                                    type="time"
                                    name="editEndTime"
                                    label="End Time"
                                    value={editBooking.End_Time__c}
                                    onchange={handleEditEndTimeChange}
                                    required>
                                </lightning-input>
                            </div>
                        </div>

                        <lightning-combobox
                            name="editStatus"
                            label="Status"
                            value={editBooking.Status__c}
                            options={editStatusOptions}
                            onchange={handleEditStatusChange}
                            required>
                        </lightning-combobox>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={closeEditModal}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleSaveBooking}>Save</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- Delete Confirmation Modal -->
        <template if:true={showDeleteModal}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeDeleteModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>
                        <h2 class="slds-modal__title slds-hyphenate">Confirm Delete</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p>Are you sure you want to delete this booking? This action cannot be undone.</p>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={closeDeleteModal}>Cancel</button>
                        <button class="slds-button slds-button_destructive" onclick={confirmDeleteBooking}>Delete</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

    </lightning-card>
</template>
